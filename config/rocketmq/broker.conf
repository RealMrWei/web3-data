# 集群名称
brokerClusterName = DefaultCluster

# Broker 名称
brokerName = broker-a

# Broker ID: 0 表示 Master，大于 0 表示 Slave
brokerId = 0

# NameServer 地址（Docker 内部使用容器名）
namesrvAddr = rocketmq-namesrv:9876

# Broker 对外 IP（修改为你的宿主机 IP，不要用 127.0.0.1）
# 如果是 Mac/Windows Docker，可以用 host.docker.internal
# Linux 可以用 ifconfig 查看实际 IP
brokerIP1 = host.docker.internal

# 监听端口
listenPort = 10911

# 删除文件时间点，默认凌晨 4 点
deleteWhen = 04

# 文件保留时间，默认 48 小时
fileReservedTime = 48

# 刷盘方式：ASYNC_FLUSH 异步刷盘，SYNC_FLUSH 同步刷盘
flushDiskType = ASYNC_FLUSH

# Broker 角色：ASYNC_MASTER 异步 Master，SYNC_MASTER 同步 Master，SLAVE 从节点
brokerRole = ASYNC_MASTER

# 自动创建 Topic
autoCreateTopicEnable = true

# 自动创建订阅组
autoCreateSubscriptionGroup = true

# 消息大小限制（默认 4M，这里设为 16M）
maxMessageSize = 16777216

# 发消息线程池数量
sendMessageThreadPoolNums = 16

# 拉消息线程池数量
pullMessageThreadPoolNums = 16

# 日志路径
rocketmqHome = /home/rocketmq